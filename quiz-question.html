<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d6efd" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <title>SmartOps Quiz Question</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="quiz-question.css" />
  </head>
  <body>
    <main class="q-shell d-flex justify-content-center">
      <section class="q-card">
        <header class="q-top d-flex align-items-center justify-content-between">
          <div class="profile-wrap d-flex align-items-center gap-2">
            <span class="profile-avatar"><i class="bi bi-person-fill"></i></span>
            <div>
              <p class="profile-name">The Academic Curator</p>
              <p class="question-count">QUESTION 12 OF 25</p>
            </div>
          </div>
          <button class="gear-btn" type="button" aria-label="Settings">
            <i class="bi bi-gear-fill"></i>
          </button>
        </header>

        <div class="progress-wrap d-flex justify-content-center">
          <div
            class="progress-circle"
            role="img"
            aria-label="Quiz progress 48 percent complete"
          >
            <span>48%</span>
          </div>
        </div>

        <section class="q-content">
          <span class="topic-pill">ADVANCED ARCHITECTURE</span>
          <h1>
            Which architectural movement is characterized by the use of industrial materials,
            geometric forms, and a rejection of ornamentation in favor of functionality?
          </h1>

          <div class="choices">
            <label class="choice-row">
              <input type="radio" name="answer" />
              <span class="choice-dot"></span>
              <span class="choice-text">Modernism</span>
            </label>

            <label class="choice-row active">
              <input type="radio" name="answer" checked />
              <span class="choice-dot"></span>
              <span class="choice-text">Bauhaus</span>
            </label>

            <label class="choice-row">
              <input type="radio" name="answer" />
              <span class="choice-dot"></span>
              <span class="choice-text">Art Deco</span>
            </label>

            <label class="choice-row">
              <input type="radio" name="answer" />
              <span class="choice-dot"></span>
              <span class="choice-text">Post-Modernism</span>
            </label>
          </div>
        </section>

        <footer class="q-actions d-flex gap-2">
          <button class="btn-review" type="button">
            <i class="bi bi-bookmark"></i>
            Mark for Review
          </button>
          <button class="btn-submit" type="button">
            Submit
            <i class="bi bi-check-circle-fill"></i>
          </button>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/protect.js"></script>
  </body>
</html>
